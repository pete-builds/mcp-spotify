services:
  mcp-spotify:
    # Pull the published image by default. To build locally instead, comment
    # out `image:` and uncomment `build: .`.
    image: ghcr.io/pete-builds/mcp-spotify:0.1.0
    # build: .
    container_name: mcp-spotify
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3703
      - TZ=${TZ:-America/New_York}
